<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Miguel Correa GitHub profile header</title>
  <desc id="desc">A modern header card with layered gradients and profile text for Miguel Correa, front-end developer.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="24" x2="1152" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#164E63"/>
    </linearGradient>
    <linearGradient id="panel" x1="269" y1="52" x2="1008" y2="268" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.16"/>
      <stop offset="1" stop-color="white" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="263" y1="231" x2="990" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(204 66) rotate(42.4) scale(266.331 214.493)">
      <stop stop-color="#22D3EE" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1066 280) rotate(-139.48) scale(281.686 177.07)">
      <stop stop-color="#14B8A6" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="0" y="0" width="1280" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>

  <g filter="url(#blur)">
    <circle cx="198" cy="70" r="118" fill="url(#glowLeft)"/>
    <circle cx="1094" cy="256" r="126" fill="url(#glowRight)"/>
  </g>

  <path d="M1042 38C1128 62 1180 123 1194 214" stroke="white" stroke-opacity="0.14" stroke-width="2"/>
  <path d="M78 270C184 241 277 184 362 92" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
  <path d="M1054 77C992 136 948 185 912 256" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="2"/>

  <rect x="40" y="40" width="1200" height="240" rx="24" fill="url(#panel)" stroke="white" stroke-opacity="0.12"/>
  <text x="72" y="142" fill="white" font-family="'Avenir Next', 'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700">Miguel Correa</text>
  <text x="72" y="180" fill="#A5F3FC" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600">Front-End Developer</text>
  <text x="72" y="216" fill="#D1D5DB" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Crafting modern interfaces, thoughtful systems, and clean product experiences.</text>

  <rect x="880" y="82" width="286" height="154" rx="22" fill="#020617" fill-opacity="0.42" stroke="white" stroke-opacity="0.14"/>
  <rect x="904" y="106" width="96" height="28" rx="14" fill="#14B8A6" fill-opacity="0.18"/>
  <text x="926" y="125" fill="#99F6E4" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">FOCUS</text>

  <text x="904" y="160" fill="white" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600">React</text>
  <text x="904" y="190" fill="white" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600">TypeScript</text>
  <text x="904" y="220" fill="white" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600">Design Systems</text>

  <circle cx="1134" cy="153" r="6" fill="#2DD4BF"/>
  <circle cx="1134" cy="183" r="6" fill="#67E8F9"/>
  <circle cx="1134" cy="213" r="6" fill="#A5F3FC"/>

  <rect x="72" y="234" width="180" height="4" rx="2" fill="url(#accent)"/>
</svg>
